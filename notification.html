<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SENTINEL Notification</title>
  <style>
    :root {
      --bg: transparent;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --warn: #f59e0b;
      --danger: #ef4444;
      --good: #10b981;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: var(--sans);
      overflow: hidden;
    }

    body {
      padding: 12px;
    }

    .notification-shell {
      width: 100%;
      animation: slideIn 0.22s ease-out;
    }

    .notification-card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }

    .close-btn:hover {
      background: #e5e7eb;
    }

    .previewHeader {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding-right: 34px;
    }

    .badge {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 15px;
      flex-shrink: 0;
    }

    .badge.low {
      background: var(--good);
    }

    .badge.med {
      background: var(--warn);
    }

    .badge.high {
      background: var(--danger);
    }

    .previewTitle {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .previewMeta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .previewTransparency {
      display: none;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    .previewMsg {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
      margin: 0 0 12px 0;
    }

    .previewBtns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .mini {
      border: none;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .mini:hover {
      transform: translateY(-1px);
    }

    .mini.primary {
      background: var(--primary);
      color: white;
    }

    .mini.secondary-accent {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .mini.neutral-accent {
      background: #f3f4f6;
      color: #374151;
    }

    .mini.selected-deny {
      background: #fee2e2;
      color: #b91c1c;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .info-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 11px;
      font-weight: 600;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 10px 14px;
      margin-top: 8px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 700;
    }

    .toggle-shell {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background .2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: transform .2s;
    }

    .toggle-on-primary .toggle-track {
      background: var(--primary);
    }

    .toggle-on-primary .toggle-thumb,
    .toggle-on-danger .toggle-thumb {
      transform: translateX(18px);
    }

    .toggle-on-danger .toggle-track {
      background: var(--danger);
    }

    .slider-wrap {
      margin-top: 8px;
      display: none;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .slider-wrap input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .slider-label {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 5px;
    }

    .tooltip-wrap {
      display: none;
      margin-top: 8px;
      position: relative;
      width: fit-content;
    }

    .tooltip-trigger {
      font-size: 12px;
      color: var(--primary);
      text-decoration: underline dotted;
      cursor: default;
    }

    .tooltip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      width: 235px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 12px;
      line-height: 1.45;
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      pointer-events: none;
      z-index: 10;
    }

    .tooltip-box::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 14px;
      border: 6px solid transparent;
      border-top-color: #1e293b;
    }

    .content-block {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .context-block {
      background: #f9fafb;
      color: var(--muted);
    }

    .consequences-block {
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
      line-height: 1.45;
    }

    .steps-block {
      background: #f9fafb;
    }

    .steps-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .steps-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .support-links {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="notification-shell">
    <div class="notification-card">
      <button class="close-btn" id="closeNotificationBtn" aria-label="Close notification">×</button>

      <div class="previewHeader">
        <div id="badge" class="badge med">!</div>
        <div>
          <div class="previewTitle" id="ntTitle">Security alert</div>
          <div class="previewMeta" id="ntMeta">General user • Weak password</div>
          <div class="previewTransparency" id="ntTransparency"></div>
        </div>
      </div>

      <p class="previewMsg" id="ntMsg">
        Your password appears in a known breach. Update now to protect your account.
      </p>

      <div id="ntContextWrap" class="content-block context-block"></div>

      <div id="ntConsequencesWrap" class="content-block consequences-block"></div>

      <div id="ntStepsWrap" class="content-block steps-block">
        <div class="steps-title">Next steps</div>
        <ol id="ntStepsList" class="steps-list"></ol>
      </div>

      <div id="ntInteraction_click_box" class="previewBtns">
        <button class="mini primary" id="ntPrimaryBtn">Allow</button>
        <button class="mini secondary-accent" id="ntRemindBtn" style="display:none;">Remind me later</button>
        <button class="mini" id="ntDenyBtn" style="display:none;">Don't Allow</button>
      </div>

      <div id="ntInteraction_slider" class="slider-wrap">
        <div class="slider-top">
          <span>Allow</span>
          <span>Don't Allow</span>
        </div>
        <input type="range" id="ntSlider" min="0" max="1" step="1" value="0" />
        <div class="slider-label" id="ntSliderLabel">Allow</div>
      </div>

      <div id="ntInteraction_toggle" style="display:none;">
        <div class="toggle-row">
          <span class="toggle-label">Allow</span>
          <div class="toggle-shell" id="ntToggleAllowShell">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <div class="toggle-row">
          <span class="toggle-label">Don't Allow</span>
          <div class="toggle-shell" id="ntToggleDenyShell">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>

      <div class="hint" id="ntHint"></div>

      <div class="support-links" id="ntSupportLinksWrap"></div>

      <div class="tooltip-wrap" id="ntVulnWrap">
        <span id="ntVulnTrigger" class="tooltip-trigger">learn about vulnerability</span>
        <div id="ntVulnTooltip" class="tooltip-box"></div>
      </div>

      <div class="tooltip-wrap" id="ntRiskWrap">
        <span id="ntRiskTrigger" class="tooltip-trigger">learn about risk</span>
        <div id="ntRiskTooltip" class="tooltip-box"></div>
      </div>
    </div>
  </div>

  <script src="notification.js"></script>
</body>
</html>
